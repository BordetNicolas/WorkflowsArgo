apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: load-test
  namespace: workflows-argo
  labels:
    app.kubernetes.io/name: load-test
spec:
  serviceAccountName: argo-workflow
  entrypoint: main
  artifactRepositoryRef:
    configMap: artifact-repositories
    key: default-v1
  arguments:
    parameters:
      - name: workers
        value: "10"
        description: Nombre de pods parallèles pour stresser le cluster Argo (charge)
  templates:
    - name: main
      dag:
        tasks:
          - name: prepare
            template: prepare
          - name: stress
            template: stress-worker
            depends: prepare
            arguments:
              parameters:
                - name: worker_id
                  value: "{{item}}"
            withParam: "{{tasks.prepare.outputs.parameters.worker_ids}}"
          - name: report
            template: report
            depends: stress
            arguments:
              parameters:
                - name: worker_ids
                  value: "{{tasks.prepare.outputs.parameters.worker_ids}}"

    # Génère la liste des workers [0..N-1] selon le paramètre workers.
    - name: prepare
      outputs:
        parameters:
          - name: worker_ids
            valueFrom:
              path: /work/worker_ids.json
        artifacts:
          - name: plan
            path: /work/plan.json
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          N="{{workflow.parameters.workers}}"
          if ! echo "${N}" | grep -Eq '^[1-9][0-9]*$'; then
            echo "[prepare] ÉCHEC: workers doit être un entier >= 1 (reçu: ${N})" >&2
            exit 1
          fi
          if [ "${N}" -gt 200 ]; then
            echo "[prepare] ÉCHEC: workers trop élevé (${N}), max 200" >&2
            exit 1
          fi

          IDS="["
          i=0
          while [ "${i}" -lt "${N}" ]; do
            if [ "${i}" -gt 0 ]; then
              IDS="${IDS},"
            fi
            IDS="${IDS}${i}"
            i=$((i + 1))
          done
          IDS="${IDS}]"
          printf '%s\n' "${IDS}" > /work/worker_ids.json

          cat > /work/plan.json <<EOF
          {
            "workflow": "{{workflow.name}}",
            "namespace": "{{workflow.namespace}}",
            "workers": ${N},
            "worker_ids": ${IDS},
            "prepared_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "[prepare] plan: ${N} workers → ${IDS}"

    # Un pod de charge : travail CPU + I/O court pour solliciter scheduler + contrôleur Argo.
    - name: stress-worker
      inputs:
        parameters:
          - name: worker_id
      outputs:
        artifacts:
          - name: worker_result
            path: /work/result.json
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          WID="{{inputs.parameters.worker_id}}"
          START="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          START_EPOCH="$(date +%s)"
          echo "[stress] worker=${WID} start=${START}"

          # Charge CPU ~10s (busy loop alpine, sans stress-ng)
          END_EPOCH=$((START_EPOCH + 10))
          x=0
          while [ "$(date +%s)" -lt "${END_EPOCH}" ]; do
            x=$((x + 1))
          done

          # Petite I/O disque
          dd if=/dev/zero of=/work/blob.bin bs=1M count=8 status=none 2>/dev/null || true
          rm -f /work/blob.bin

          END="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ELAPSED=$(( $(date +%s) - START_EPOCH ))
          cat > /work/result.json <<EOF
          {
            "worker_id": ${WID},
            "hostname": "$(hostname)",
            "started_at": "${START}",
            "finished_at": "${END}",
            "elapsed_seconds": ${ELAPSED},
            "loops": ${x},
            "status": "ok"
          }
          EOF
          echo "[stress] worker=${WID} done elapsed=${ELAPSED}s loops=${x}"

    # Rapport agrégé vers MinIO.
    - name: report
      inputs:
        parameters:
          - name: worker_ids
      outputs:
        artifacts:
          - name: report
            path: /work/report.json
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          N="{{workflow.parameters.workers}}"
          IDS='{{inputs.parameters.worker_ids}}'
          FINISHED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > /work/report.json <<EOF
          {
            "workflow": "{{workflow.name}}",
            "namespace": "{{workflow.namespace}}",
            "uid": "{{workflow.uid}}",
            "workers": ${N},
            "worker_ids": ${IDS},
            "finished_at": "${FINISHED}",
            "status": "completed",
            "note": "Stress test Argo: ${N} pods parallèles (~10s CPU chacun). Détails par worker dans les artifacts stress-worker."
          }
          EOF
          echo "[report] écrit /work/report.json (${N} workers)"
          cat /work/report.json
