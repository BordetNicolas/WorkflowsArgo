apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: load-test
  namespace: workflows-argo
  labels:
    app.kubernetes.io/name: load-test
spec:
  serviceAccountName: argo-workflow
  entrypoint: main
  artifactRepositoryRef:
    configMap: artifact-repositories
    key: default-v1
  arguments:
    parameters:
      - name: workers
        value: "25"
        description: Nombre de pods parallèles (1–500). Chaque pod réserve ~1 CPU / 1 GiB.
      - name: duration_seconds
        value: "120"
        description: Durée du stress CPU+RAM+I/O par pod (secondes)
      - name: cpu_workers
        value: "4"
        description: Stressors CPU stress-ng par pod
      - name: vm_workers
        value: "2"
        description: Stressors mémoire (vm) par pod
      - name: vm_bytes
        value: "512M"
        description: RAM allouée par stressor vm (ex. 512M, 1G)
      - name: hdd_workers
        value: "2"
        description: Stressors disque (hdd) par pod
      - name: hdd_bytes
        value: "512M"
        description: Volume écrit/lu par stressor hdd
  templates:
    - name: main
      dag:
        tasks:
          - name: prepare
            template: prepare
          - name: stress
            template: stress-worker
            depends: prepare
            arguments:
              parameters:
                - name: worker_id
                  value: "{{item}}"
            withParam: "{{tasks.prepare.outputs.parameters.worker_ids}}"
          - name: report
            template: report
            depends: stress
            arguments:
              parameters:
                - name: worker_ids
                  value: "{{tasks.prepare.outputs.parameters.worker_ids}}"

    - name: prepare
      outputs:
        parameters:
          - name: worker_ids
            valueFrom:
              path: /work/worker_ids.json
        artifacts:
          - name: plan
            path: /work/plan.json
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          N="{{workflow.parameters.workers}}"
          DUR="{{workflow.parameters.duration_seconds}}"
          if ! echo "${N}" | grep -Eq '^[1-9][0-9]*$'; then
            echo "[prepare] ÉCHEC: workers doit être un entier >= 1 (reçu: ${N})" >&2
            exit 1
          fi
          if [ "${N}" -gt 500 ]; then
            echo "[prepare] ÉCHEC: workers trop élevé (${N}), max 500" >&2
            exit 1
          fi
          if ! echo "${DUR}" | grep -Eq '^[1-9][0-9]*$'; then
            echo "[prepare] ÉCHEC: duration_seconds invalide (${DUR})" >&2
            exit 1
          fi
          if [ "${DUR}" -gt 3600 ]; then
            echo "[prepare] ÉCHEC: duration_seconds trop élevé (${DUR}), max 3600" >&2
            exit 1
          fi

          IDS="["
          i=0
          while [ "${i}" -lt "${N}" ]; do
            if [ "${i}" -gt 0 ]; then
              IDS="${IDS},"
            fi
            IDS="${IDS}${i}"
            i=$((i + 1))
          done
          IDS="${IDS}]"
          printf '%s\n' "${IDS}" > /work/worker_ids.json

          cat > /work/plan.json <<EOF
          {
            "workflow": "{{workflow.name}}",
            "namespace": "{{workflow.namespace}}",
            "workers": ${N},
            "duration_seconds": ${DUR},
            "cpu_workers": "{{workflow.parameters.cpu_workers}}",
            "vm_workers": "{{workflow.parameters.vm_workers}}",
            "vm_bytes": "{{workflow.parameters.vm_bytes}}",
            "hdd_workers": "{{workflow.parameters.hdd_workers}}",
            "hdd_bytes": "{{workflow.parameters.hdd_bytes}}",
            "worker_ids": ${IDS},
            "prepared_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "tool": "stress-ng"
          }
          EOF
          echo "[prepare] plan: ${N} workers × ${DUR}s (stress-ng cpu/vm/hdd)"

    # Charge réelle via stress-ng + requests CPU/RAM pour saturer le scheduler.
    - name: stress-worker
      inputs:
        parameters:
          - name: worker_id
      outputs:
        artifacts:
          - name: worker_result
            path: /work/result.json
      volumes:
        - name: scratch
          emptyDir:
            sizeLimit: 2Gi
      script:
        image: alexeiled/stress-ng:latest
        command: [bash]
        volumeMounts:
          - name: scratch
            mountPath: /tmp
        resources:
          requests:
            cpu: "1"
            memory: 1Gi
            ephemeral-storage: 1Gi
          limits:
            cpu: "4"
            memory: 2Gi
            ephemeral-storage: 2Gi
        source: |
          set -euo pipefail
          mkdir -p /work
          WID="{{inputs.parameters.worker_id}}"
          DUR="{{workflow.parameters.duration_seconds}}"
          CPU_N="{{workflow.parameters.cpu_workers}}"
          VM_N="{{workflow.parameters.vm_workers}}"
          VM_BYTES="{{workflow.parameters.vm_bytes}}"
          HDD_N="{{workflow.parameters.hdd_workers}}"
          HDD_BYTES="{{workflow.parameters.hdd_bytes}}"
          START="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          START_EPOCH="$(date +%s)"
          echo "[stress] worker=${WID} start=${START} duration=${DUR}s"
          echo "[stress] cpu=${CPU_N} vm=${VM_N}×${VM_BYTES} hdd=${HDD_N}×${HDD_BYTES} + io"

          set +e
          stress-ng \
            --cpu "${CPU_N}" \
            --cpu-method all \
            --vm "${VM_N}" \
            --vm-bytes "${VM_BYTES}" \
            --vm-keep \
            --vm-populate \
            --io 4 \
            --hdd "${HDD_N}" \
            --hdd-bytes "${HDD_BYTES}" \
            --hdd-opts sync \
            --timeout "${DUR}s" \
            --metrics-brief \
            --timestamp \
            2>&1 | tee /work/stress-ng.log
          RC=${PIPESTATUS[0]}
          set -e

          END="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ELAPSED=$(( $(date +%s) - START_EPOCH ))
          STATUS="ok"
          if [ "${RC}" -ne 0 ]; then
            STATUS="stress-ng-exit-${RC}"
          fi

          echo "[stress] worker=${WID} stress-ng log (tail):"
          tail -n 30 /work/stress-ng.log || true

          cat > /work/result.json <<EOF
          {
            "worker_id": ${WID},
            "hostname": "$(hostname)",
            "started_at": "${START}",
            "finished_at": "${END}",
            "elapsed_seconds": ${ELAPSED},
            "duration_requested_seconds": ${DUR},
            "stress_ng_exit_code": ${RC},
            "cpu_workers": ${CPU_N},
            "vm_workers": ${VM_N},
            "vm_bytes": "${VM_BYTES}",
            "hdd_workers": ${HDD_N},
            "hdd_bytes": "${HDD_BYTES}",
            "io_workers": 4,
            "status": "${STATUS}"
          }
          EOF
          echo "[stress] worker=${WID} done elapsed=${ELAPSED}s status=${STATUS}"
          exit 0

    - name: report
      inputs:
        parameters:
          - name: worker_ids
      outputs:
        artifacts:
          - name: report
            path: /work/report.json
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          N="{{workflow.parameters.workers}}"
          DUR="{{workflow.parameters.duration_seconds}}"
          IDS='{{inputs.parameters.worker_ids}}'
          FINISHED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > /work/report.json <<EOF
          {
            "workflow": "{{workflow.name}}",
            "namespace": "{{workflow.namespace}}",
            "uid": "{{workflow.uid}}",
            "workers": ${N},
            "duration_seconds": ${DUR},
            "worker_ids": ${IDS},
            "finished_at": "${FINISHED}",
            "status": "completed",
            "tool": "stress-ng",
            "phases": ["cpu", "vm", "io", "hdd"],
            "per_pod_requests": {"cpu": "1", "memory": "1Gi"},
            "note": "Stress agressif: ${N} pods × ${DUR}s (stress-ng cpu/vm/io/hdd + requests K8s). Détails dans artifacts worker_result."
          }
          EOF
          echo "[report] écrit /work/report.json (${N} workers × ${DUR}s)"
          cat /work/report.json
