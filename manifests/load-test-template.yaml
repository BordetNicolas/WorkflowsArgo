apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: load-test
  namespace: workflows-argo
  labels:
    app.kubernetes.io/name: load-test
spec:
  serviceAccountName: argo-workflow
  entrypoint: main
  artifactRepositoryRef:
    configMap: artifact-repositories
    key: default-v1
  arguments:
    parameters:
      - name: workers
        value: "10"
        description: Nombre de pods parallèles pour stresser le cluster Argo (charge)
  templates:
    - name: main
      dag:
        tasks:
          - name: prepare
            template: prepare
          - name: stress
            template: stress-worker
            depends: prepare
            arguments:
              parameters:
                - name: worker_id
                  value: "{{item}}"
            withParam: "{{tasks.prepare.outputs.parameters.worker_ids}}"
          - name: report
            template: report
            depends: stress
            arguments:
              parameters:
                - name: worker_ids
                  value: "{{tasks.prepare.outputs.parameters.worker_ids}}"

    # Génère la liste des workers [0..N-1] selon le paramètre workers.
    - name: prepare
      outputs:
        parameters:
          - name: worker_ids
            valueFrom:
              path: /work/worker_ids.json
        artifacts:
          - name: plan
            path: /work/plan.json
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          N="{{workflow.parameters.workers}}"
          if ! echo "${N}" | grep -Eq '^[1-9][0-9]*$'; then
            echo "[prepare] ÉCHEC: workers doit être un entier >= 1 (reçu: ${N})" >&2
            exit 1
          fi
          if [ "${N}" -gt 200 ]; then
            echo "[prepare] ÉCHEC: workers trop élevé (${N}), max 200" >&2
            exit 1
          fi

          IDS="["
          i=0
          while [ "${i}" -lt "${N}" ]; do
            if [ "${i}" -gt 0 ]; then
              IDS="${IDS},"
            fi
            IDS="${IDS}${i}"
            i=$((i + 1))
          done
          IDS="${IDS}]"
          printf '%s\n' "${IDS}" > /work/worker_ids.json

          cat > /work/plan.json <<EOF
          {
            "workflow": "{{workflow.name}}",
            "namespace": "{{workflow.namespace}}",
            "workers": ${N},
            "worker_ids": ${IDS},
            "prepared_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "[prepare] plan: ${N} workers → ${IDS}"

    # Un pod de charge : phases CPU, RAM (/dev/shm) et I/O disque.
    - name: stress-worker
      inputs:
        parameters:
          - name: worker_id
      outputs:
        artifacts:
          - name: worker_result
            path: /work/result.json
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          WID="{{inputs.parameters.worker_id}}"
          START="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          START_EPOCH="$(date +%s)"
          echo "[stress] worker=${WID} start=${START}"

          # --- CPU ~10s (busy loops en parallèle) ---
          CPU_START="$(date +%s)"
          cpu_worker() {
            end=$(( $(date +%s) + 10 ))
            n=0
            while [ "$(date +%s)" -lt "${end}" ]; do
              n=$((n + 1))
            done
            echo "${n}" > "/work/cpu_loops_$1"
          }
          cpu_worker 0 &
          cpu_worker 1 &
          wait
          CPU_LOOPS=$(( $(cat /work/cpu_loops_0) + $(cat /work/cpu_loops_1) ))
          CPU_ELAPSED=$(( $(date +%s) - CPU_START ))
          rm -f /work/cpu_loops_0 /work/cpu_loops_1
          echo "[stress] worker=${WID} CPU ok elapsed=${CPU_ELAPSED}s loops=${CPU_LOOPS}"

          # --- RAM ~64 MiB dans tmpfs /dev/shm, retenus ~5s ---
          RAM_START="$(date +%s)"
          RAM_MB=64
          RAM_PATH="/dev/shm/load-test-${WID}.bin"
          if [ ! -d /dev/shm ]; then
            echo "[stress] worker=${WID} /dev/shm absent, fallback /tmp" >&2
            RAM_PATH="/tmp/load-test-ram-${WID}.bin"
          fi
          dd if=/dev/zero of="${RAM_PATH}" bs=1M count="${RAM_MB}" status=none
          # Toucher la mémoire pour forcer l'allocation réelle
          od -An -N16 -tx1 "${RAM_PATH}" >/dev/null
          sleep 5
          RAM_BYTES="$(wc -c < "${RAM_PATH}" | tr -d ' ')"
          rm -f "${RAM_PATH}"
          RAM_ELAPSED=$(( $(date +%s) - RAM_START ))
          echo "[stress] worker=${WID} RAM ok elapsed=${RAM_ELAPSED}s bytes=${RAM_BYTES}"

          # --- I/O disque : écriture, sync, relecture (32 MiB × 2 passes) ---
          IO_START="$(date +%s)"
          IO_MB=32
          IO_PASSES=2
          IO_FILE="/work/io-blob.bin"
          p=0
          while [ "${p}" -lt "${IO_PASSES}" ]; do
            dd if=/dev/zero of="${IO_FILE}" bs=1M count="${IO_MB}" status=none
            sync
            dd if="${IO_FILE}" of=/dev/null bs=1M status=none
            p=$((p + 1))
          done
          IO_BYTES=$((IO_MB * 1024 * 1024 * IO_PASSES))
          rm -f "${IO_FILE}"
          IO_ELAPSED=$(( $(date +%s) - IO_START ))
          echo "[stress] worker=${WID} IO ok elapsed=${IO_ELAPSED}s bytes_rw~=${IO_BYTES}"

          END="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ELAPSED=$(( $(date +%s) - START_EPOCH ))
          cat > /work/result.json <<EOF
          {
            "worker_id": ${WID},
            "hostname": "$(hostname)",
            "started_at": "${START}",
            "finished_at": "${END}",
            "elapsed_seconds": ${ELAPSED},
            "cpu": {
              "elapsed_seconds": ${CPU_ELAPSED},
              "parallel_loops": 2,
              "loops": ${CPU_LOOPS}
            },
            "ram": {
              "elapsed_seconds": ${RAM_ELAPSED},
              "target_mib": ${RAM_MB},
              "bytes_allocated": ${RAM_BYTES}
            },
            "io": {
              "elapsed_seconds": ${IO_ELAPSED},
              "block_mib": ${IO_MB},
              "passes": ${IO_PASSES},
              "bytes_rw_approx": ${IO_BYTES}
            },
            "status": "ok"
          }
          EOF
          echo "[stress] worker=${WID} done elapsed=${ELAPSED}s (cpu+ram+io)"

    # Rapport agrégé vers MinIO.
    - name: report
      inputs:
        parameters:
          - name: worker_ids
      outputs:
        artifacts:
          - name: report
            path: /work/report.json
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          N="{{workflow.parameters.workers}}"
          IDS='{{inputs.parameters.worker_ids}}'
          FINISHED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > /work/report.json <<EOF
          {
            "workflow": "{{workflow.name}}",
            "namespace": "{{workflow.namespace}}",
            "uid": "{{workflow.uid}}",
            "workers": ${N},
            "worker_ids": ${IDS},
            "finished_at": "${FINISHED}",
            "status": "completed",
            "phases": ["cpu", "ram", "io"],
            "note": "Stress test Argo: ${N} pods parallèles (CPU ~10s, RAM ~64MiB/5s, IO 32MiB×2). Détails par worker dans les artifacts stress-worker."
          }
          EOF
          echo "[report] écrit /work/report.json (${N} workers, phases cpu/ram/io)"
          cat /work/report.json
