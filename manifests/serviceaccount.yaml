# ServiceAccount used by Workflow / WorkflowTemplate pods in this namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow
  namespace: workflows-argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow
  namespace: workflows-argo
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, watch, patch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, watch]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow
  namespace: workflows-argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: workflows-argo
