# Executor SA for Workflow / WorkflowTemplate pods (Argo Workflows >= 3.4).
# https://argo-workflows.readthedocs.io/en/latest/workflow-rbac/
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow
  namespace: workflows-argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow
  namespace: workflows-argo
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtaskresults
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow
  namespace: workflows-argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: workflows-argo
