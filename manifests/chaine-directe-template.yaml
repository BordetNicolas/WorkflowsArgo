apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: chaine-directe
  namespace: workflows-argo
  labels:
    app.kubernetes.io/name: chaine_directe
spec:
  serviceAccountName: argo-workflow
  entrypoint: main
  artifactRepositoryRef:
    configMap: artifact-repositories
    key: default-v1
  arguments:
    parameters:
      - name: input_xml_key
        description: Clé S3 du XML source (ex. inbox/doc-001.xml)
      - name: packet_seed
        value: "42"
        description: Graine pour le nombre de paquets par canal (démo déterministe)
      - name: simulate_missing_input
        value: "true"
        description: Conservé pour compat ; l'entrée XML est simulée (stub) à partir de la clé
  templates:
    - name: main
      dag:
        tasks:
          - name: validate-xml
            template: validate-xml
            arguments:
              parameters:
                - name: input_xml_key
                  value: "{{workflow.parameters.input_xml_key}}"
                - name: simulate_missing_input
                  value: "{{workflow.parameters.simulate_missing_input}}"
          - name: xml-to-ps
            template: xml-to-ps
            depends: validate-xml
            arguments:
              artifacts:
                - name: validated_xml
                  from: "{{tasks.validate-xml.outputs.artifacts.validated_xml}}"
          - name: modify-ps
            template: modify-ps
            depends: xml-to-ps
            arguments:
              artifacts:
                - name: document_ps
                  from: "{{tasks.xml-to-ps.outputs.artifacts.document_ps}}"
          - name: sort-split
            template: sort-split
            depends: modify-ps
            arguments:
              parameters:
                - name: packet_seed
                  value: "{{workflow.parameters.packet_seed}}"
              artifacts:
                - name: document_ps
                  from: "{{tasks.modify-ps.outputs.artifacts.document_ps}}"
          - name: archive-packet
            template: archive-packet
            depends: sort-split
            arguments:
              parameters:
                - name: packet
                  value: "{{item}}"
            withParam: "{{tasks.sort-split.outputs.parameters.archive_packets}}"
          - name: print-packet
            template: print-packet
            depends: sort-split
            arguments:
              parameters:
                - name: packet
                  value: "{{item}}"
            withParam: "{{tasks.sort-split.outputs.parameters.print_packets}}"
          - name: egate-packet
            template: egate-packet
            depends: sort-split
            arguments:
              parameters:
                - name: packet
                  value: "{{item}}"
            withParam: "{{tasks.sort-split.outputs.parameters.egate_packets}}"

    # 1 — Validation XML (mock). Entrée = paramètre clé ; artifacts inter-étapes via MinIO.
    - name: validate-xml
      inputs:
        parameters:
          - name: input_xml_key
          - name: simulate_missing_input
      outputs:
        artifacts:
          - name: validated_xml
            path: /work/validated.xml
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          mkdir -p /work
          KEY="{{inputs.parameters.input_xml_key}}"
          SIM="{{inputs.parameters.simulate_missing_input}}"
          echo "[validate-xml] clé logique S3=${KEY} simulate_missing_input=${SIM}"

          if [ -z "${KEY}" ]; then
            echo "[validate-xml] ÉCHEC: input_xml_key vide" >&2
            exit 1
          fi

          cat > /work/validated.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <documents source_key="${KEY}">
            <document id="1"><title>Stub document 1</title></document>
            <document id="2"><title>Stub document 2</title></document>
            <document id="3"><title>Stub document 3</title></document>
          </documents>
          EOF

          if ! grep -q '<documents' /work/validated.xml; then
            echo "[validate-xml] ÉCHEC: contenu non XML" >&2
            exit 1
          fi
          echo "[validate-xml] validation OK (XML stub pour ${KEY})"

    # 2 — XML → PostScript (document composé, mock)
    - name: xml-to-ps
      inputs:
        artifacts:
          - name: validated_xml
            path: /work/validated.xml
      outputs:
        artifacts:
          - name: document_ps
            path: /work/document.ps
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          echo "[xml-to-ps] transformation XML → PostScript (simulation)"
          DOC_COUNT=$(grep -c '<document ' /work/validated.xml || true)
          cat > /work/document.ps <<EOF
          %!PS-Adobe-3.0
          % Simulated composed PostScript document
          % source: validated.xml
          % document_count: ${DOC_COUNT}
          /Courier findfont 12 scalefont setfont
          72 720 moveto
          (Chaine directe - document compose - ${DOC_COUNT} docs) show
          showpage
          EOF
          echo "[xml-to-ps] écrit /work/document.ps (${DOC_COUNT} documents)"

    # 3 — Modification du PostScript (mock)
    - name: modify-ps
      inputs:
        artifacts:
          - name: document_ps
            path: /work/document.ps
      outputs:
        artifacts:
          - name: document_ps
            path: /work/document_mod.ps
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          echo "[modify-ps] enrichment / modification PS (simulation)"
          cp /work/document.ps /work/document_mod.ps
          cat >> /work/document_mod.ps <<'EOF'
          % --- modified ---
          % barcode overlay simulated
          % address block simulated
          EOF
          echo "[modify-ps] document_mod.ps prêt"

    # 4 — Tri / éclatement → listes JSON pour fan-out (0..N paquets / canal)
    - name: sort-split
      inputs:
        parameters:
          - name: packet_seed
        artifacts:
          - name: document_ps
            path: /work/document.ps
      outputs:
        parameters:
          - name: archive_packets
            valueFrom:
              path: /work/archive_packets.json
          - name: print_packets
            valueFrom:
              path: /work/print_packets.json
          - name: egate_packets
            valueFrom:
              path: /work/egate_packets.json
        artifacts:
          - name: packets_dir
            path: /work/packets
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          SEED="{{inputs.parameters.packet_seed}}"
          A=$((SEED % 4))
          P=$(( (SEED / 4) % 4 ))
          E=$(( (SEED / 16) % 4 ))
          echo "[sort-split] seed=${SEED} → archive=${A} print=${P} egate=${E} paquets"

          mkdir -p /work/packets/archive /work/packets/print /work/packets/egate

          build_list() {
            CHANNEL="$1"
            COUNT="$2"
            OUT="$3"
            DIR="/work/packets/${CHANNEL}"
            echo -n '[' > "${OUT}"
            i=1
            while [ "${i}" -le "${COUNT}" ]; do
              PID="$(echo "${CHANNEL}" | cut -c1 | tr 'a-z' 'A-Z')-$(printf '%03d' "${i}")"
              DOC_COUNT=$(( (SEED + i) % 5 + 1 ))
              S3_KEY="packets/${CHANNEL}/${PID}.ps"
              {
                echo "%!PS-Adobe-3.0"
                echo "% packet ${PID} channel=${CHANNEL} docs=${DOC_COUNT}"
                cat /work/document.ps
              } > "${DIR}/${PID}.ps"
              if [ "${i}" -gt 1 ]; then
                echo -n ',' >> "${OUT}"
              fi
              printf '{"packet_id":"%s","doc_count":%s,"s3_key":"%s","channel":"%s"}' \
                "${PID}" "${DOC_COUNT}" "${S3_KEY}" "${CHANNEL}" >> "${OUT}"
              i=$((i + 1))
            done
            echo ']' >> "${OUT}"
            echo "[sort-split] ${CHANNEL}: $(cat "${OUT}")"
          }

          build_list archive "${A}" /work/archive_packets.json
          build_list print "${P}" /work/print_packets.json
          build_list egate "${E}" /work/egate_packets.json

    # Canal archivage — PS → PDF + XML (mock)
    - name: archive-packet
      inputs:
        parameters:
          - name: packet
      outputs:
        artifacts:
          - name: archive_result
            path: /work/out
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          PACKET='{{inputs.parameters.packet}}'
          echo "[archive] paquet=${PACKET}"
          PID=$(echo "${PACKET}" | sed -n 's/.*"packet_id":"\([^"]*\)".*/\1/p')
          DOCS=$(echo "${PACKET}" | sed -n 's/.*"doc_count":\([0-9]*\).*/\1/p')
          KEY=$(echo "${PACKET}" | sed -n 's/.*"s3_key":"\([^"]*\)".*/\1/p')
          mkdir -p /work/out
          echo "%PDF-1.4 simulated archive of ${PID} (${DOCS} docs) from ${KEY}" > "/work/out/${PID}.pdf"
          cat > "/work/out/${PID}.xml" <<EOF
          <?xml version="1.0"?>
          <archive packet_id="${PID}" doc_count="${DOCS}" source_key="${KEY}"/>
          EOF
          echo "[archive] produits ${PID}.pdf + ${PID}.xml"

    # Canal impression — enrichissement PS + envoi printer (mock)
    - name: print-packet
      inputs:
        parameters:
          - name: packet
      outputs:
        artifacts:
          - name: print_result
            path: /work/out
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          PACKET='{{inputs.parameters.packet}}'
          echo "[print] paquet=${PACKET}"
          PID=$(echo "${PACKET}" | sed -n 's/.*"packet_id":"\([^"]*\)".*/\1/p')
          DOCS=$(echo "${PACKET}" | sed -n 's/.*"doc_count":\([0-9]*\).*/\1/p')
          KEY=$(echo "${PACKET}" | sed -n 's/.*"s3_key":"\([^"]*\)".*/\1/p')
          mkdir -p /work/out
          cat > "/work/out/${PID}.enriched.ps" <<EOF
          %!PS-Adobe-3.0
          % enriched for physical printer
          % packet=${PID} docs=${DOCS} source=${KEY}
          % tray=1 duplex=true
          showpage
          EOF
          echo "[print] envoi simulé vers imprimante physique → ${PID}.enriched.ps"
          echo "SENT ${PID} to printer://physical/default" > "/work/out/${PID}.receipt.txt"

    # Canal guichet électronique — PS → XML + PDF embed (mock)
    - name: egate-packet
      inputs:
        parameters:
          - name: packet
      outputs:
        artifacts:
          - name: egate_result
            path: /work/out
      script:
        image: alpine:3.20
        command: [sh]
        source: |
          set -eu
          PACKET='{{inputs.parameters.packet}}'
          echo "[egate] paquet=${PACKET}"
          PID=$(echo "${PACKET}" | sed -n 's/.*"packet_id":"\([^"]*\)".*/\1/p')
          DOCS=$(echo "${PACKET}" | sed -n 's/.*"doc_count":\([0-9]*\).*/\1/p')
          KEY=$(echo "${PACKET}" | sed -n 's/.*"s3_key":"\([^"]*\)".*/\1/p')
          mkdir -p /work/out
          cat > "/work/out/${PID}.egate.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <egate_submission packet_id="${PID}" doc_count="${DOCS}" source_key="${KEY}">
            <embedded_pdf encoding="base64">JVBERi0xLjQgc2ltdWxhdGVkLVBERi1mb3ItJHtQSUR9Cg==</embedded_pdf>
          </egate_submission>
          EOF
          echo "[egate] XML guichet électronique écrit (${PID}.egate.xml)"
